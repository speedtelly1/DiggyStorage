<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Только необходимые мета-теги для этой страницы -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Все элементы | Хранилище</title>
    <meta name="description" content="Все элементы Хранилища - полный каталог цифровых ресурсов">
    <link rel="stylesheet" href="style.css?v=1.0.3">
    <link rel="icon" href="images/hranit.png" type="image/png">
</head>
<body>
    <header class="glass-effect">
        <div class="header-container">
            <div class="logo">
                <span class="logo-icon">📁</span>
                Хранилище
            </div>
            <button class="mobile-menu-btn">☰</button>
            <nav>
                <ul>
                    <li><a href="index.html#home" class="nav-link">Главная</a></li>
                    <li><a href="index.html#items" class="nav-link active">Элементы</a></li>
                    <li><a href="index.html#categories" class="nav-link">Категории</a></li>
                    <li><a href="index.html#about" class="nav-link">О проекте</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <nav class="breadcrumbs" id="breadcrumbs">
            <a href="index.html">Главная</a> <span class="separator">→</span>
            <span class="current">Все элементы</span>
        </nav>

        <section id="items-page" class="page active">
            <!-- Только контент страницы элементов -->
            <h1 class="page-title">Все элементы</h1>
            
            <button class="add-item-btn" id="add-item-btn">
                <span>+</span> Добавить элемент
            </button>
            
            <div class="search-container">
                <div class="search-input-wrapper">
                    <input type="text" class="search-input" placeholder="Поиск по названию, описанию или мета-тегам...">
                    <button class="search-settings-btn" id="search-settings-btn" title="Настройки поиска">
                        ⚙️
                    </button>
                </div>
                <button class="search-btn">Найти</button>
            </div>
            
            <div class="items-grid" id="all-items">
                <!-- Элементы загружаются через JS -->
            </div>
            
            <div class="pagination" id="pagination"></div>
        </section>
    </main>

    <div class="modal" id="add-item-modal">
        <!-- Модальное окно добавления -->
    </div>

    <div class="modal" id="search-settings-modal">
        <!-- Модальное окно настроек поиска -->
    </div>

    <footer>
        <!-- Футер -->
    </footer>

    <script src="script.js"></script>
    
    <script>
    // Автоактивация страницы элементов
    window.addEventListener('load', function() {
        // Инициализируем элементы
        if (typeof setupPagination === 'function') {
            setupPagination();
        }
        if (typeof renderAllItems === 'function') {
            renderAllItems();
        }
        // Инициализируем настройки поиска
        if (typeof initSearchSettings === 'function') {
            setTimeout(initSearchSettings, 500);
        }
    });
    </script>
</body>
</html>
