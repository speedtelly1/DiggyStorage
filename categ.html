<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Хранилище цифровых ресурсов с мета-тегами - современная платформа для организации, управления и поиска цифрового контента. Каталогизация ресурсов по категориям и тегам.">
    <meta name="keywords" content="хранилище, мета-теги, цифровые ресурсы, управление контентом, википедия, каталог ресурсов, категории, теги, поиск, организация контента">
    <meta name="author" content="Тимофей">
    <meta name="google-site-verification" content="jBY-ytvwYjSY1Jn9kXCqns11_XIrfqZlssMgNCpi8t0" />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/hranit.png" type="image/png">
    <title>Категории | Хранилище</title>

</head>
<body>
    <!-- Шапка сайта -->
    <header class="glass-effect">
        <div class="header-container">
            <div class="logo">
                <span class="logo-icon">📁</span>
                Хранилище
            </div>
            <button class="mobile-menu-btn">☰</button>
            <nav>
                <ul>
                    <li><a href="#home" class="nav-link active">Главная</a></li>
                    <li><a href="#items" class="nav-link">Элементы</a></li>
                    <li><a href="#categories" class="nav-link">Категории</a></li>
                    <li><a href="#about" class="nav-link">О проекте</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Основной контент -->
    <main>
        <!-- Хлебные крошки -->
        <nav class="breadcrumbs" id="breadcrumbs">
            <a href="index.html">Главная</a>
        </nav>

        <!-- Страница категорий -->
        <section id="categories-page" class="page">
            <h1 class="page-title">Категории</h1>
            <p>Выберите категорию для просмотра соответствующих элементов:</p>
            
            <div class="categories-grid" id="categories-container">
                <!-- Категории будут загружены через JS -->
            </div>
            
            <div class="category-items" id="category-items-container">
                <!-- Элементы выбранной категории будут загружены здесь -->
            </div>
        </section>

    <!-- Футер -->
    <footer>
        <div class="footer-container">
            <div class="logo">
                <span class="logo-icon">📁</span>
                Хранилище
            </div>
            <div class="footer-links">
                <a href="privacy.html">Политика конфиденциальности</a>
                <a href="terms.html">Условия использования</a>
            </div>
            <div class="copyright">
                &copy; 2025 Хранилище с мета-тегами. Все права защищены.
            </div>
        </div>
    </footer>

    <script>
// Автоматически активируем вкладку "Категории" при загрузке categ.html
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(() => {
        const categLink = document.querySelector('a[href="#categories"]');
        if (categLink && !categLink.classList.contains('active')) {
            categLink.click();
        }
    }, 100);
});
</script>

    <script src="script.js"></script>

    <script>
// Определяем, какая страница открыта
document.addEventListener('DOMContentLoaded', function() {
    // Определяем текущую страницу по имени файла
    const currentPage = window.location.pathname.split('/').pop();
    
    // Маппинг файлов -> секций SPA
    const pageMap = {
        'items.html': 'items',
        'categ.html': 'categories',
        'index.html': 'home',
        'privacy.html': 'privacy',
        'terms.html': 'terms'
    };
    
    const targetSection = pageMap[currentPage] || 'home';
    
    // Если это не главная страница, активируем нужную секцию
    if (targetSection !== 'home') {
        // Ждем загрузки основного скрипта
        setTimeout(() => {
            // Ищем ссылку на нужную страницу и кликаем
            const targetLink = document.querySelector(`a[href="#${targetSection}"]`);
            if (targetLink) {
                targetLink.click();
            }
        }, 100);
    }
});
</script>

</body>
</html>
